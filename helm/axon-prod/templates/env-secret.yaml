apiVersion: v1
kind: Secret
metadata:
  name: {{ include "axon-prod.fullname" . }}-secret-env
  labels:
    {{- include "axon-prod.labels" . | nindent 4 }}
{{- if or .Values.secretConfig .Values.global.secretConfig }}
stringData:
  {{- $mergedConf := merge .Values.secretConfig .Values.global.secretConfig }}
  {{- range $key, $val := $mergedConf }}
  {{- $condensedVal := include "axon-prod.util.condense-list" $val }}
  {{- $tmpltEnv := tpl (toYaml $condensedVal) $ }}
  {{- if $tmpltEnv }}
  {{ $key }}: {{ $tmpltEnv }}
  {{- end }}
  {{- end }}
{{- else }}
data: {}
{{- end }}
