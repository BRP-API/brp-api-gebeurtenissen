apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "axon-prod.fullname" . }}
  labels:
    {{- include "axon-prod.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  serviceName: {{ include "axon-prod.grpcServiceName" . }}
  selector:
    matchLabels:
      {{- include "axon-prod.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if or .Values.checksums .Values.podAnnotations }}
      annotations:
      {{- range .Values.checksums }}
        checksums/{{ .name }}: {{ include (print $.Template.BasePath (print "/" .template)) $ | sha256sum }}
      {{- end }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      labels:
        {{- include "axon-prod.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "axon-prod.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: {{ template "axon-prod.image" .Values.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.gui.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpc.port }}
              protocol: TCP
          env:
            # Pod name is used as the stable Axon Server hostname within the StatefulSet.
            - name: AXONIQ_AXONSERVER_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - configMapRef:
                name: {{ include "axon-prod.fullname" . }}-env
            - secretRef:
                name: {{ include "axon-prod.fullname" . }}-secret-env
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /axonserver/data
            - name: events
              mountPath: /axonserver/events
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "axon-prod.selectorLabels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.data.accessModes | nindent 10 }}
        {{- if .Values.persistence.data.storageClassName }}
        storageClassName: {{ .Values.persistence.data.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.data.size }}
    - metadata:
        name: events
        labels:
          {{- include "axon-prod.selectorLabels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.events.accessModes | nindent 10 }}
        {{- if .Values.persistence.events.storageClassName }}
        storageClassName: {{ .Values.persistence.events.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.events.size }}
